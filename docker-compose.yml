services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: openpark
      POSTGRES_USER: openpark
      POSTGRES_PASSWORD: openpark
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  db_test:
    image: postgres:16
    environment:
      POSTGRES_DB: openpark_test
      POSTGRES_USER: openpark
      POSTGRES_PASSWORD: openpark
    ports:
      - "5433:5432"

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Docker 내부에서 DB는 서비스명으로 접근
      DATABASE_URL: postgresql+asyncpg://openpark:openpark@db/openpark
    volumes:
      - .:/app   # --reload가 코드 변경을 감지하도록 소스 마운트
    depends_on:
      - db

volumes:
  postgres_data:
